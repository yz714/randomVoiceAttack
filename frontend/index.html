<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>噪音监测系统</title>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="toast-container" id="toast-container"></div>
	<div class="container">
		<div class="header-section">
			<div class="stats-top">
				<div class="stat-card" title="低频比率表示低频能量占总能量的比例，值越高说明低频成分越多">
					<h3>当前低频比率</h3>
					<p id="current-low-freq">0.00</p>
				</div>
				<div class="stat-card" title="当前麦克风检测到的音量强度">
					<h3>当前音量</h3>
					<p id="current-volume">0.00</p>
				</div>
				<div class="stat-card" title="当前采样周期内检测到的最大声音样本值">
					<h3>最大样本值</h3>
					<p id="current-max-sample">0.00</p>
				</div>
				<div class="stat-card time-range-card" title="设置图表显示的时间范围">
					<h3>时间范围</h3>
					<div class="time-range-control">
						<select id="time-range-select">
							<option value="1">1分钟</option>
							<option value="3">3分钟</option>
							<option value="5">5分钟</option>
							<option value="10">10分钟</option>
							<option value="30">30分钟</option>
							<option value="60">1小时</option>
							<option value="120">2小时</option>
							<option value="custom">自定义</option>
						</select>
						<input type="number" id="custom-time-range" min="1" placeholder="分钟" style="display: none;">
					</div>
				</div>
			</div>
			<h1>噪音监测系统</h1>
			<div class="button-container-right">
				<button class="action-btn btn-refresh" id="refresh-btn">🔄 刷新</button>
				<button class="action-btn btn-play" id="play-random-btn">▶️ 随机</button>
				<button class="action-btn btn-sequence" id="play-sequence-btn">⏯️ 连续</button>
				<button class="action-btn btn-stop" id="stop-btn">⏹️ 停止</button>
			</div>
		</div>
		<div class="visualizer-container">
			<div class="visualizer-title">🎵 音频能量可视化</div>
			<div class="energy-bar-container">
				<div class="energy-bar" id="energy-bar"></div>
			</div>
			<div class="volume-display" id="volume-display">音量: 0.0000</div>
		</div>
		<div class="top-section">
			<div class="terminal-wrapper">
				<div class="terminal-container">
					<div class="terminal-header">
						<div class="terminal-btn terminal-btn-red"></div>
						<div class="terminal-btn terminal-btn-yellow"></div>
						<div class="terminal-btn terminal-btn-green"></div>
						<span class="terminal-title">detection-logger</span>
					</div>
					<div class="terminal-content" id="terminal-content">
						<div class="terminal-line">
							<span class="terminal-timestamp">[系统]</span>
							<span class="terminal-type-info">等待检测日志...</span>
						</div>
					</div>
				</div>
			</div>
			<div class="stats-wrapper">
				<div class="small-chart-header">
					<span class="small-chart-title">低频比率历史</span>
					<button class="refresh-full-chart-btn" id="refresh-full-chart-btn">🔄</button>
				</div>
				<div class="small-chart-container">
					<canvas id="fullLowFreqChart"></canvas>
				</div>
			</div>
		</div>
		<div class="charts-wrapper">
			<div class="chart-container">
				<canvas id="lowFreqChart"></canvas>
			</div>
			<div class="chart-container">
				<canvas id="volumeChart"></canvas>
			</div>
		</div>
	</div>
	<script src="app.js"></script>
</body>
</html>
